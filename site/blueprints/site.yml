title: Site
unlisted: false
templates: font

tabs:
  tab1:
    label: Dashboard
    icon: dashboard
    columns:
      - width: 1/4
          sections:
            welcome:
              type: fields
              fields:
                info:
                  type: info
                  theme: none
                  label: Willkommen im Kirby Panel 🎉
                  text: |
                    Hi, das hier ist das Panel von Kirby. Hier kannst du deine Website verwalten und Inhalte hinzufügen.

      - width: 2/4
          sections: 
            allPages:
              headline: Hauptseiten
              layout: cardlets
              type: pages
              create: false
              templates:
                - home
                - about
                - work
                - music
              image: 
                query: icon
                back: black 
      - width: 1/4
          sections:
            sidePages:
              headline: Sekundäre Seiten
              type: pages
              status: listed
              templates:
                - imprint
                - privacy
                - default
                - text
            hiddenPages:
              headline: Versteckte Seiten
              type: pages
              create:
                - text
                - overview
              status: draft
              help: Diese Seiten müssen erst sichtbar geschaltet werden, bevor sie für Besucher*innen sichtbar sind und zu Menüs hinzugefügt werden können.

  tab2:
    label: Einstellungen
    icon: settings
    columns:
      - width: 2/3
          sections: 
            info:
              type: fields
              fields:
                headline1: 
                  type: headline
                  label: Kontaktdaten
                  numbered: false
                email:
                  type: email
                  label: Email
                address:
                  type: textarea
                  buttons: false
                  label: Adresse
                tel:
                  type: text
                  label: Telefon
                socials:
                  type: structure
                  label: Social Media Kanäle
                  fields:
                    title:
                      type: text
                      label: Name des sozialen Netzwerks
                      required: true
                      width: 2/3
                    icon:
                      type: select
                      label: Icon
                      help: Wähle das entsprechende Icon
                      options: 
                        xing: Xing
                        linkedin: LinkedIn
                        instagram: Instagram
                      width: 1/3
                    url:
                      type: url
                      label: URL
                      required: true
                contactText:
                  type: text
                  label: Text der Kontaktsektion
                  required: true

            cookies:
              type: fields
              fields:
                headline3: 
                  type: headline
                  label: Cookie-Hinweise
                  numbered: false
                cookieText:
                  label: Text im Cookie-Hinweis
                  type: textarea
                  buttons: false
                  size: small
                cookieLink:
                  type: pages
                  label: Im Cookie-Hinweis verlinkte Seite
                  multiple: false

      - width: 1/3
          sections:   
            navs:
              type: fields
              fields:
                headline2:
                  type: headline
                  label: Navigation
                  numbered: false
                mainmenu:
                  type: pages
                  label: Seiten im Hauptmenü
                dutysites:
                  type: pages
                  label: Rechtliche Seiten im Footer
        
  seo: seo/site
                

        



              