title: Projekte

sections:
  main:
    type: fields
    fields:
      cover:
        label: Cover Bild
        type: files
        multiple: false
        help: Wähle ein Bild aus, das als Cover für dieses Projekt verwendet wird.

      description:
        label: Beschreibung
        type: textarea
        size: large
        help: Füge eine kurze Beschreibung des Projekts hinzu.

      price:
        label: Preis
        type: number
        help: Gib den Preis des Bikes in $ an.
        width: 1/2

      brand:
        label: Marke
        type: text
        help: Gib die Marke des Bikes an.
        width: 1/2
  images:
    type: files
    label: Alle Bilder
    layout: cards
