name: Auswahlfeld
icon: list-bullet
wysiwyg: true
preview: fields

tabs:
  tab-field:
    label: Feld
    fields:
      name: 
        type: text
        label: Name
        required: true
        pattern: "[a-z0-9]+"
        width: 1/2
      title:
        type: text
        label: Label
        width: 1/2
      options:
        type: tags
        label: Auswahlmöglichkeiten
        required: true
        layout: list
      display:
        type: select
        label: Typ
        default: select
        required: true
        options:
          select: Select-Feld
          radio: Radio Buttons
          checkbox: Checkboxen
        width: 1/2
      required:
        type: toggle
        label: Verpflichtend
        width: 1/2

